description = ".claude/HANDOVER.md から前セッションの情報を復元する"
prompt = """
`.claude/HANDOVER.md` から前回のセッション情報を読み込み、状況を把握して次のアクションを提案してください。

1. **ファイル読み込み**: `.claude/HANDOVER.md` が存在するか確認し、内容を読み込んでください。
2. **コンテキスト復元**: 背景、目標、参照情報、これまでの決定事項、作業状況を詳細に把握してください。
3. **現状確認**: `git status` や `git log` を使用して、ハンドオーバー以降の変更がないか確認してください。
4. **レポート**: 把握した内容を「前回セッションのサマリー」「引き継がれたコンテキスト」「注意が必要な事項」「提案された次のステップ」の形式で報告してください。
5. **提案**: アルファベット番号付きのリストで、具体的な次のアクションを提案してください。
"""
