description = "作業レポートをMarkdownファイルとして出力する"
prompt = """
現在の状況や調査結果をレポートとして出力してください。

1. **出力先**: 引数 {{args}} でパスが指定されていればそれを使用し、なければ `~/Documents/memos/Reports` に出力してください。
2. **命名**: `YYYYMMDD-kebab-case.md` 形式で命名してください。
3. **内容**: 概要、詳細、結論、ネクストアクションを含めてください。
4. **確認**: 作成後、内容の修正が必要かユーザーに確認してください。
"""
