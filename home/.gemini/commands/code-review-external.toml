description = "外部プロセス(claude -p)を使用してコミット済みのコードをレビュー・修正させ、結果を検証します"
prompt = """
以下の手順に従って、コミットされたコードの外部レビュー、修正、およびその検証を行ってください。

【重要】
セキュリティ保護のため、`run_shell_command` 内で `$(...)` やバッククォートによるコマンド置換を使用することは禁止されています。情報は必ず個別のステップで取得し、リテラルとして次のステップに渡してください。

【手順】
1. **未コミット変更の確認とコミット**:
   - `git status` を実行し、未コミットの変更があるか確認してください。
   - 変更がある場合は、レビューを開始する前にまずそれらをコミットしてください。
   - コミットメッセージは、レビュー担当者が「何のために何をしたのか」を正確に把握できるよう、変更の背景、目的、および具体的な内容を論理的かつ簡潔に記述してください。
   - コミットが完了したら、その最新のコミットを対象として以降の手順を進めてください。

2. **情報の取得**:
   - 対象（引数 {{args}}、HEAD、または上記で作成したコミット）を特定してください。
   - 単一のコミットハッシュだけでなく、`main...feature` のようなコミット範囲や、`HEAD~3` のような相対指定も受け入れられるようにします。これを `TARGET_REVISION` とします。

3. **外部レビューと修正の依頼**:
   - 特定した `TARGET_REVISION` を**文字列としてプロンプトに埋め込み**、`claude -p` を実行してください。
   - `run_shell_command` に渡すコマンド例：
     ```bash
     claude  --permission-mode "acceptEdits" -p "対象 [TARGET_REVISION] の変更内容をレビューし、問題点があれば直接ファイルを編集して修正してください。
     
     指示:
     1. `git log -p [TARGET_REVISION]` または `git show [TARGET_REVISION]` を実行して、含まれる全ての変更内容を分析してください。
     2. セキュリティ、パフォーマンス、可読性、アーキテクチャの観点からレビューを行ってください。
     3. 改善点が見つかった場合、利用可能なツールを使って該当ファイルを直接編集し、修正を適用してください。
     4. どのような問題をどのように修正したか、実行結果として簡潔に出力してください。"
     ```

4. **修正内容の検証**:
   - 外部プロセス（claude）による処理が完了した後、`run_shell_command` で `git diff` を実行し、ワークツリーにどのような変更が加えられたかを確認してください。
   - 変更内容（diff）を読み取り、以下の点を目視（静的分析）でチェックしてください。
     - 元のコードの意図が壊れていないか
     - 新たなバグや構文エラーが混入していないか
     - プロジェクトの規約に反していないか
   - 検証結果（変更の妥当性、問題の有無）をユーザーに報告してください。問題があればどのように直すべきかも提案してください。
"""
