description = "セッションの作業内容を .claude/HANDOVER.md に記録する"
prompt = """
このセッションの作業内容を振り返り、`.claude/HANDOVER.md` に引き継ぎドキュメントを生成してください。

1. **既存ファイルの処理**: `.claude/` ディレクトリを確認し、既存の `HANDOVER.md` がある場合は日付を付けてリネームし、`HANDOVER.zip` にバックアップ（zip追加）してから削除してください。
2. **セッション分析**: 以下の項目を日本語でまとめ、構造化されたMarkdownを作成してください。
   - 📋 背景とコンテキスト
   - 📚 参照情報（リンクと要点）
   - 📊 作業概要（主要タスク、成果、変更ファイル）
   - ✅ うまくいったこと / ❌ 課題
   - 💡 主要な決定事項と技術的背景
   - ⚠️ 学んだ教訓と注意点
   - 🎯 次のステップ（具体的・優先順位付き）
3. **保存**: 冒頭にフロントマター（date, session-id, commit）を付与して保存してください。

特に重点的に残して欲しいこと: {{args}}
"""
