description = "Claude CodeのスラッシュコマンドをGemini CLI向けに同期・変換する"
prompt = """
Claude CodeのカスタムコマンドをGemini CLI向けに同期・変換します。

1. **ソース確認**: `/Users/zeero/lib/dotfiles/home/.claude/commands/` 配下のマークダウンファイルをすべてリストアップしてください。
