description = "外部プロセス(claude -p)を使用してドキュメントをレビューし、タスクを作成します"
prompt = """
指定されたファイル（{{args}}）を `claude -p` を使って外部プロセスでレビューし、結果をタスク化してください。

【手順】
1. **ファイルの確認**: 引数 {{args}} で指定されたファイルが存在することを確認してください。
2. **外部レビューの実行**: `run_shell_command` を使用して、以下のコマンドを実行してください。
   ```bash
   claude -p "以下のドキュメントをレビューしてください。

   【重点確認項目】
   1. 技術的レビュー（Technical accuracy）: 技術的な内容が正確か、論理展開が適切か。
   2. 分かりやすさ（Tone/Style）: 読者（特にAI）にとって意図が明確に伝わるトーン＆マナーになっているか。
   3. AIエージェントへのインプットとしての網羅性: AIコーディングエージェントがこのドキュメントを読んで実装を行う上で、必要な情報（前提条件、制約、期待する出力など）が不足なく網羅されているか。

   【出力要件】
   - 総合的な評価（数行）
   - 修正・追記すべき具体的な問題点のリスト（箇条書きで明確に）
   " < "{{args}}"
   ```
3. **結果の処理**:
   - `claude -p` の出力を分析し、総合的な評価をユーザーに報告してください。
   - 具体的な問題点については、タスクとして管理してください。
     - Gemini CLIのタスク管理ツール（`write_todos` や `tracker_create_task`）が利用可能な場合はそれを使用してください。
     - 利用できない場合は、ファイル内のTODOセクションに追記するか、新しいMarkdownファイルを作成してタスクをリストアップしてください。

【注意】
- パスにスペースが含まれる可能性があるため、適切にクォートしてください。
- 実行前に、なぜそのコマンドを実行するか簡潔に説明してください。
"""
